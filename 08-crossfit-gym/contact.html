<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON FORGE | Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;800&family=Teko:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'forge-black': '#050505',
                        'forge-dark': '#0F0F0F',
                        'forge-gray': '#1F1F1F',
                        'forge-neon': '#CCFF00',
                        'forge-white': '#FFFFFF',
                    },
                    fontFamily: {
                        display: ['Anton', 'sans-serif'],
                        body: ['Barlow Condensed', 'sans-serif'],
                        tech: ['Teko', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #FFFFFF; }
        
        input, textarea {
            background-color: #0F0F0F;
            border: 1px solid #1F1F1F;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #CCFF00;
            background-color: #050505;
        }
        
        .map-filter { filter: grayscale(100%) invert(100%) contrast(1.2) brightness(0.8); }
        
        .mobile-menu-overlay {
            clip-path: circle(0% at 100% 0);
            transition: clip-path 0.6s ease-in-out;
        }
        .mobile-menu-overlay.active {
            clip-path: circle(150% at 100% 0);
        }
    </style>
</head>
<body class="font-body antialiased">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 py-6 px-6 md:px-12 flex justify-between items-center mix-blend-difference">
        <a href="index.html" class="font-display text-3xl md:text-4xl tracking-wider text-forge-white uppercase">IRON <span class="text-forge-neon">FORGE</span></a>
        <div class="hidden md:flex gap-12 font-tech text-xl tracking-widest uppercase font-medium">
            <a href="classes.html" class="nav-link text-forge-white hover:text-forge-neon transition-colors">CLASSES</a>
            <a href="pricing.html" class="nav-link text-forge-white hover:text-forge-neon transition-colors">PRICING</a>
            <a href="contact.html" class="text-forge-neon">CONTACT</a>
            <a href="pricing.html" class="text-forge-black bg-forge-neon px-6 py-1 hover:bg-white transition-colors skew-x-[-10deg] inline-block"><span class="skew-x-[10deg] inline-block">JOIN NOW</span></a>
        </div>
        <button id="menu-btn" class="md:hidden text-forge-white text-3xl"><i class="fas fa-bars"></i></button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu-overlay fixed inset-0 bg-forge-neon z-40 flex items-center justify-center">
        <button id="close-menu" class="absolute top-6 right-6 text-4xl text-forge-black"><i class="fas fa-times"></i></button>
        <div class="flex flex-col gap-8 text-center font-display text-6xl text-forge-black uppercase">
            <a href="index.html" class="hover:text-white transition-colors">HOME</a>
            <a href="classes.html" class="hover:text-white transition-colors">CLASSES</a>
            <a href="pricing.html" class="hover:text-white transition-colors">PRICING</a>
            <a href="contact.html" class="hover:text-white transition-colors">CONTACT</a>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <!-- Info & Form -->
        <div class="lg:w-1/2 pt-32 px-6 md:px-12 pb-12 lg:pb-0 flex flex-col justify-center">
            <h1 class="font-display text-6xl md:text-8xl text-forge-white uppercase mb-8">DROP IN <br> <span class="text-forge-neon">OR DIE TRYING</span></h1>
            
            <div class="mb-12 space-y-2 font-tech text-xl tracking-widest text-forge-white/70">
                <p>123 IRON STREET, LOS ANGELES, CA</p>
                <p>HELLO@IRONFORGE.GYM</p>
                <p>+1 (555) 000-0000</p>
            </div>

            <form class="space-y-6 max-w-md">
                <div class="grid grid-cols-2 gap-6">
                    <input type="text" placeholder="NAME" class="w-full p-4 text-forge-white font-tech text-lg tracking-wider placeholder-forge-white/30">
                    <input type="email" placeholder="EMAIL" class="w-full p-4 text-forge-white font-tech text-lg tracking-wider placeholder-forge-white/30">
                </div>
                <input type="text" placeholder="SUBJECT" class="w-full p-4 text-forge-white font-tech text-lg tracking-wider placeholder-forge-white/30">
                <textarea rows="4" placeholder="MESSAGE" class="w-full p-4 text-forge-white font-tech text-lg tracking-wider placeholder-forge-white/30"></textarea>
                <button type="submit" class="bg-forge-neon text-forge-black w-full py-4 font-display text-2xl uppercase tracking-widest hover:bg-white transition-colors">SEND MESSAGE</button>
            </form>
        </div>

        <!-- Map (Simulated) -->
        <div class="lg:w-1/2 h-[50vh] lg:h-auto bg-gray-800 relative overflow-hidden">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d423286.27404345275!2d-118.69191921441556!3d34.02016130939095!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c2c75ddc27da13%3A0xe22fdf6f254608f4!2sLos%20Angeles%2C%20CA%2C%20USA!5e0!3m2!1sen!2ses!4v1620000000000!5m2!1sen!2ses" width="100%" height="100%" style="border:0; filter: grayscale(100%) invert(90%) contrast(1.2);" allowfullscreen="" loading="lazy"></iframe>
            <div class="absolute inset-0 pointer-events-none mix-blend-multiply bg-forge-neon/10"></div>
        </div>

    </div>

    <script>
        // Init Lenis
        const lenis = new Lenis({
            duration: 0.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true,
            mouseMultiplier: 1,
            smoothTouch: false
        });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Mobile Menu
        const menuBtn = document.getElementById('menu-btn');
        const closeMenu = document.getElementById('close-menu');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => mobileMenu.classList.add('active'));
        closeMenu.addEventListener('click', () => mobileMenu.classList.remove('active'));
    </script>
</body>
</html>
