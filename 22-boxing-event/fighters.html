<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIGHT OF GLORY | Fighters</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'v-pink': '#FF0055',
                        'v-purple': '#6600FF',
                        'v-green': '#00FF99',
                        'v-dark': '#0a0510',
                    },
                    fontFamily: {
                        display: ['Anton', 'sans-serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    dropShadow: {
                        'neon': '0 0 10px rgba(255, 0, 85, 0.5)',
                        'neon-green': '0 0 10px rgba(0, 255, 153, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #0a0510; 
            color: white; 
            overflow-x: hidden;
            /* Allow vertical scroll on mobile, hidden on desktop if content fits */
        }
        @media (min-width: 768px) {
            body { overflow: hidden; }
        }

        /* Gradiente Velada */
        .beam {
            position: absolute;
            top: -20%;
            width: 100px;
            height: 150%;
            background: linear-gradient(to bottom, rgba(0,255,153,0) 0%, rgba(0,255,153,0.4) 20%, rgba(0,255,153,0) 100%);
            transform-origin: top center;
            filter: blur(20px);
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .beam-left { left: 10%; transform: rotate(15deg); animation: beam-sway-left 4s infinite alternate ease-in-out; }
        .beam-right { right: 10%; transform: rotate(-15deg); animation: beam-sway-right 4s infinite alternate ease-in-out; }

        @keyframes beam-sway-left { from { transform: rotate(15deg); opacity: 0.5; } to { transform: rotate(20deg); opacity: 0.8; } }
        @keyframes beam-sway-right { from { transform: rotate(-15deg); opacity: 0.5; } to { transform: rotate(-20deg); opacity: 0.8; } }

        /* 3D Text Effect */
        .neon-text {
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #FF0055,
                0 0 30px #FF0055,
                0 0 40px #FF0055;
        }
        
        .name-back {
            -webkit-text-stroke: 2px rgba(255, 0, 85, 0.5);
            color: transparent;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.1);
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Fighter Cutout */
        .fighter-img {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Cards */
        .roster-card {
            transition: all 0.3s ease;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .roster-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            border-color: #00FF99;
        }
        .roster-card.active {
            border: 2px solid #00FF99;
            box-shadow: 0 0 30px rgba(0, 255, 153, 0.6);
            transform: scale(1.1);
            z-index: 10;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">

    <!-- Background Layer -->
    <div class="absolute inset-0 z-0">
        <!-- Stadium/Palace Background -->
        <img src="https://images.unsplash.com/photo-1560185893-a55cbc8c57e8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" class="w-full h-full object-cover opacity-30 grayscale mix-blend-multiply">
        
        <!-- Atmosphere Gradients -->
        <div class="absolute inset-0 bg-gradient-to-t from-v-dark via-v-purple/20 to-v-pink/20"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/80 to-transparent"></div>
        
        <!-- Laser Beams -->
        <div class="beam beam-left"></div>
        <div class="beam beam-right"></div>
        
        <!-- Floor Fog -->
        <div class="absolute bottom-0 w-full h-1/3 bg-gradient-to-t from-v-dark to-transparent opacity-90"></div>
    </div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 px-8 py-6 flex justify-between items-center">
        <a href="index.html" class="font-display text-3xl italic tracking-wider text-white drop-shadow-neon">VELADA <span class="text-v-green">IV</span></a>
        <button class="text-white font-display text-xl uppercase hover:text-v-green transition-colors">Menú</button>
    </nav>

    <!-- Main Stage -->
    <main class="relative z-10 flex-grow flex items-center justify-center">
        
        <!-- Name Behind (Parallax Layer) -->
        <h1 id="fighter-name-bg" class="font-display text-[6rem] md:text-[20rem] leading-none uppercase name-back whitespace-nowrap opacity-20 md:opacity-30">
            THE BEAST
        </h1>

        <!-- Fighter Container -->
        <div class="relative z-20 h-full w-full flex items-end justify-center pb-32 pointer-events-none">
            <img id="main-fighter-img" src="" class="h-[85%] md:h-[95%] object-contain fighter-img">
        </div>

        <!-- Name Front (Neon) -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-30 text-center pointer-events-none mt-20 md:mt-0 w-full px-4">
            <h1 id="fighter-name-front" class="font-display text-5xl sm:text-6xl md:text-9xl text-white uppercase italic tracking-tighter drop-shadow-neon break-words leading-none">
                THE BEAST
            </h1>
            <div class="flex justify-center gap-4 mt-2">
                <span id="fighter-record" class="bg-v-green text-black font-bold px-3 py-1 text-sm uppercase skew-x-[-10deg]">24-0-0</span>
                <span id="fighter-weight" class="bg-white text-black font-bold px-3 py-1 text-sm uppercase skew-x-[-10deg]">105 KG</span>
            </div>
        </div>

        <!-- Floating Stats (Left) -->
        <div class="absolute top-24 left-4 md:top-1/3 md:left-20 z-20 md:block pointer-events-none">
            <div class="flex flex-row md:flex-col gap-4 md:gap-6 text-left">
                <div>
                    <span class="text-v-green font-display text-sm md:text-xl uppercase block">Edad</span>
                    <p id="stat-age" class="text-2xl md:text-4xl font-bold text-white">28</p>
                </div>
                <div>
                    <span class="text-v-green font-display text-sm md:text-xl uppercase block">Altura</span>
                    <p id="stat-height" class="text-2xl md:text-4xl font-bold text-white">1.92M</p>
                </div>
            </div>
        </div>

        <!-- Floating Opponent (Right) -->
        <div class="absolute top-24 right-4 md:top-1/3 md:right-20 z-20 md:block text-right cursor-pointer pointer-events-auto group" onclick="swapFighters()">
            <span class="text-gray-400 font-display text-xs md:text-sm uppercase tracking-widest group-hover:text-white transition-colors block">VS Rival</span>
            <h2 id="opponent-name" class="text-2xl md:text-5xl font-display text-white italic text-stroke group-hover:text-v-pink group-hover:text-stroke-0 transition-all">THE TITAN</h2>
            <p class="text-[10px] md:text-xs text-v-green mt-1 md:mt-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">Click para ver</p>
        </div>

    </main>

    <!-- Roster Grid (Bottom) -->
    <div class="fixed bottom-0 w-full z-50 pb-6 pt-10 bg-gradient-to-t from-black via-black/80 to-transparent">
        <div class="container mx-auto px-4 overflow-x-auto">
            <div class="flex justify-start md:justify-center gap-4 min-w-max px-4" id="roster-container">
                <!-- Cards injected by JS -->
            </div>
        </div>
    </div>

    <script>
        // Data with Better Boxer Images
        const fighters = [
            {
                id: 'beast',
                name: 'The Beast',
                opponentId: 'titan',
                // Using a more dynamic boxer pose
                image: 'https://images.unsplash.com/photo-1590556409324-aa8072c19c48?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80', 
                record: '24-0-0',
                weight: '105 KG',
                age: '28',
                height: '1.92 M',
                theme: 'v-pink'
            },
            {
                id: 'titan',
                name: 'The Titan',
                opponentId: 'beast',
                // Another dynamic pose
                image: 'https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
                record: '22-1-0',
                weight: '102 KG',
                age: '26',
                height: '1.88 M',
                theme: 'v-purple'
            },
            {
                id: 'toro',
                name: 'El Toro',
                opponentId: 'speed',
                image: 'https://images.unsplash.com/photo-1615117970172-35f606346761?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
                record: '15-2-0',
                weight: '75 KG',
                age: '25',
                height: '1.80 M',
                theme: 'v-green'
            },
            {
                id: 'speed',
                name: 'Speed',
                opponentId: 'toro',
                image: 'https://images.unsplash.com/photo-1549719386-74dfcbf7dbed?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
                record: '14-0-1',
                weight: '74 KG',
                age: '23',
                height: '1.78 M',
                theme: 'v-pink'
            },
            {
                id: 'alana',
                name: 'La Cobra',
                opponentId: 'queen',
                image: 'https://images.unsplash.com/photo-1594381898411-846e7d193883?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
                record: 'Debut',
                weight: '60 KG',
                age: '22',
                height: '1.65 M',
                theme: 'v-purple'
            },
             {
                id: 'queen',
                name: 'Queen',
                opponentId: 'alana',
                image: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
                record: '2-0-0',
                weight: '61 KG',
                age: '24',
                height: '1.68 M',
                theme: 'v-green'
            }
        ];

        let currentId = 'beast';

        function init() {
            renderRoster();
            loadFighter('beast', false);
        }

        function renderRoster() {
            const container = document.getElementById('roster-container');
            container.innerHTML = '';
            
            fighters.forEach(f => {
                const card = document.createElement('div');
                card.className = `roster-card relative w-24 h-32 md:w-32 md:h-40 bg-gray-900 overflow-hidden cursor-pointer border-2 ${f.id === currentId ? 'active border-v-green' : 'border-white/20'}`;
                card.onclick = () => loadFighter(f.id, true);
                
                card.innerHTML = `
                    <img src="${f.image}" class="w-full h-full object-cover object-top opacity-80 hover:opacity-100 transition-opacity">
                    <div class="absolute bottom-0 w-full bg-gradient-to-t from-black to-transparent p-2 pt-6">
                        <p class="font-display text-white text-sm uppercase text-center tracking-wider">${f.name}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function loadFighter(id, animate) {
            currentId = id;
            const f = fighters.find(x => x.id === id);
            const opp = fighters.find(x => x.id === f.opponentId);

            const els = {
                img: document.getElementById('main-fighter-img'),
                nameBg: document.getElementById('fighter-name-bg'),
                nameFront: document.getElementById('fighter-name-front'),
                record: document.getElementById('fighter-record'),
                weight: document.getElementById('fighter-weight'),
                age: document.getElementById('stat-age'),
                height: document.getElementById('stat-height'),
                oppName: document.getElementById('opponent-name')
            };

            if (animate) {
                // Out Animation
                gsap.to(els.img, { x: -50, opacity: 0, duration: 0.3 });
                gsap.to([els.nameFront, els.nameBg], { scale: 0.9, opacity: 0, duration: 0.3, onComplete: updateData });
            } else {
                updateData();
            }

            function updateData() {
                // Update Content
                els.img.src = f.image;
                els.nameBg.innerText = f.name;
                els.nameFront.innerText = f.name;
                els.record.innerText = f.record;
                els.weight.innerText = f.weight;
                els.age.innerText = f.age;
                els.height.innerText = f.height;
                els.oppName.innerText = opp.name;
                
                // Remove bg from existing image (since we are using rectangular photos, we need a trick to make them look cutout-ish or just cool cards)
                // Since I cannot remove background dynamically without an API, I will use a CSS mask-image on the img tag in styles to fade the bottom.
                
                renderRoster(); // Update active state

                if (animate) {
                    // In Animation
                    gsap.fromTo(els.img, { x: 50, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "power2.out" });
                    gsap.fromTo([els.nameFront, els.nameBg], { scale: 1.1, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, stagger: 0.1 });
                }
            }
        }

        function swapFighters() {
            const curr = fighters.find(x => x.id === currentId);
            loadFighter(curr.opponentId, true);
        }

        window.onload = init;

    </script>
</body>
</html>
