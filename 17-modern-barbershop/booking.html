<!DOCTYPE html>
<html lang="es" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar | THE GENTLEMAN'S CUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'noir': '#050505',
                        'gold': '#C5A059',
                        'stone': '#1A1A1A',
                    },
                    fontFamily: {
                        serif: ['Italiana', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #050505; 
            color: #E0E0E0; 
            cursor: none;
        }
        
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: #C5A059; }
        .cursor-outline { width: 40px; height: 40px; border: 1px solid rgba(197, 160, 89, 0.5); transition: width 0.2s, height 0.2s; }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        input, select {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 1rem 0;
            width: 100%;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Montserrat', sans-serif;
        }
        input:focus, select:focus {
            border-bottom-color: #C5A059;
        }
        
        /* Custom Radio */
        .service-option input:checked + div {
            border-color: #C5A059;
            background-color: rgba(197, 160, 89, 0.05);
        }
        .service-option input:checked + div h3 {
            color: #C5A059;
        }
    </style>
</head>
<body class="antialiased selection:bg-gold selection:text-noir min-h-screen flex flex-col">

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="noise-overlay"></div>

    <nav class="fixed w-full z-40 px-8 py-8 flex justify-between items-center mix-blend-difference text-white">
        <a href="index.html" class="font-serif text-xl tracking-widest hover:text-gold transition-colors">THE CUT.</a>
        
        <div class="hidden md:flex gap-12 font-sans text-xs tracking-[0.2em] uppercase">
            <a href="services.html" class="hover:text-gold transition-colors relative group">
                Servicios
                <span class="absolute -bottom-2 left-0 w-0 h-[1px] bg-gold transition-all group-hover:w-full"></span>
            </a>
            <a href="booking.html" class="text-gold relative group">
                Reservar
                <span class="absolute -bottom-2 left-0 w-full h-[1px] bg-gold"></span>
            </a>
        </div>
        
        <a href="booking.html" class="md:hidden text-xs uppercase tracking-widest border border-white/20 px-6 py-3 hover:bg-gold hover:text-noir hover:border-gold transition-all">
            Reservar
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-32 pb-20 px-6">
        <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-20">
            
            <!-- Left Column: Context -->
            <div class="hidden lg:flex flex-col justify-center space-y-12 reveal-side">
                <div class="w-12 h-[1px] bg-gold"></div>
                <h1 class="font-serif text-6xl text-white leading-tight">
                    Asegura Tu <br>
                    <span class="italic text-gray-500">Momento</span>
                </h1>
                <p class="font-sans text-gray-400 leading-loose max-w-md">
                    El tiempo es el lujo definitivo. Reserve su cita y permítanos prepararnos para su llegada.
                </p>
                <div class="pt-12 border-t border-white/5">
                    <p class="font-sans text-xs text-gold uppercase tracking-widest mb-4">Disponibilidad</p>
                    <div class="flex justify-between max-w-xs text-sm text-gray-500 font-sans">
                        <span>Lun - Vie</span>
                        <span>10:00 - 20:00</span>
                    </div>
                    <div class="flex justify-between max-w-xs text-sm text-gray-500 font-sans mt-2">
                        <span>Sáb</span>
                        <span>09:00 - 18:00</span>
                    </div>
                </div>
            </div>

            <!-- Right Column: Form -->
            <div class="bg-stone/30 backdrop-blur-sm p-8 md:p-12 border border-white/5 reveal-side">
                <form id="booking-form" class="space-y-12">
                    
                    <!-- Service Selection -->
                    <div>
                        <label class="block font-sans text-xs text-gold uppercase tracking-widest mb-6">Seleccionar Ritual</label>
                        <div class="space-y-4">
                            <label class="service-option block cursor-pointer group">
                                <input type="radio" name="service" value="cut" class="hidden" checked>
                                <div class="border border-white/10 p-6 transition-all duration-300 group-hover:border-white/30">
                                    <div class="flex justify-between items-center">
                                        <h3 class="font-serif text-xl text-white transition-colors">El Corte de Caballero</h3>
                                        <span class="font-sans text-sm text-gray-500">$45</span>
                                    </div>
                                </div>
                            </label>
                            
                            <label class="service-option block cursor-pointer group">
                                <input type="radio" name="service" value="shave" class="hidden">
                                <div class="border border-white/10 p-6 transition-all duration-300 group-hover:border-white/30">
                                    <div class="flex justify-between items-center">
                                        <h3 class="font-serif text-xl text-white transition-colors">Afeitado con Toalla Caliente</h3>
                                        <span class="font-sans text-sm text-gray-500">$55</span>
                                    </div>
                                </div>
                            </label>

                            <label class="service-option block cursor-pointer group">
                                <input type="radio" name="service" value="royal" class="hidden">
                                <div class="border border-white/10 p-6 transition-all duration-300 group-hover:border-white/30">
                                    <div class="flex justify-between items-center">
                                        <h3 class="font-serif text-xl text-white transition-colors">El Tratamiento Real</h3>
                                        <span class="font-sans text-sm text-gray-500">$110</span>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Date & Details -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block font-sans text-xs text-gray-500 uppercase tracking-widest mb-2">Fecha</label>
                            <input type="date" class="text-white">
                        </div>
                        <div>
                            <label class="block font-sans text-xs text-gray-500 uppercase tracking-widest mb-2">Hora</label>
                            <select class="text-white cursor-pointer">
                                <option class="bg-noir">10:00 AM</option>
                                <option class="bg-noir">11:00 AM</option>
                                <option class="bg-noir">12:00 PM</option>
                                <option class="bg-noir">02:00 PM</option>
                                <option class="bg-noir">03:00 PM</option>
                                <option class="bg-noir">04:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block font-sans text-xs text-gray-500 uppercase tracking-widest mb-2">Nombre</label>
                            <input type="text" placeholder="Tu Nombre">
                        </div>
                        <div>
                            <label class="block font-sans text-xs text-gray-500 uppercase tracking-widest mb-2">Teléfono</label>
                            <input type="tel" placeholder="Tu Número">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gold text-noir py-5 font-sans text-xs font-bold uppercase tracking-[0.2em] hover:bg-white transition-colors duration-500">
                        Confirmar Cita
                    </button>

                </form>

                <!-- Success Message -->
                <div id="success-msg" class="hidden absolute inset-0 bg-noir border border-white/5 flex flex-col items-center justify-center text-center p-8 z-20">
                    <div class="font-serif text-6xl text-gold mb-6">Confirmado</div>
                    <p class="font-sans text-gray-400 max-w-xs mb-8">Su cita ha sido reservada. Esperamos su llegada.</p>
                    <button onclick="window.location.reload()" class="font-sans text-xs text-white border-b border-white pb-1 uppercase tracking-widest hover:text-gold hover:border-gold transition-colors">Reservar Otra</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Lenis
        const lenis = new Lenis({ duration: 1.2, smooth: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Cursor
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            cursorDot.style.left = `${e.clientX}px`; cursorDot.style.top = `${e.clientY}px`;
            cursorOutline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" });
        });

        // Form Logic
        const form = document.getElementById('booking-form');
        const successMsg = document.getElementById('success-msg');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            const originalText = btn.innerText;
            
            btn.innerText = "Procesando...";
            btn.style.opacity = "0.7";
            
            setTimeout(() => {
                successMsg.classList.remove('hidden');
                gsap.from(successMsg.children, {
                    y: 20, opacity: 0, stagger: 0.1, duration: 0.8, ease: "power3.out"
                });
            }, 1500);
        });

        // Entrance Animation
        gsap.from(".reveal-side", {
            y: 50, opacity: 0, duration: 1.5, stagger: 0.3, ease: "power4.out", delay: 0.2
        });
    </script>
</body>
</html>
