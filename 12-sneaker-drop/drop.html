<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE KICKS | RAFFLE ENTRY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Koulen&family=Permanent+Marker&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hype-black': '#050505',
                        'hype-gray': '#1a1a1a',
                        'hype-red': '#ff003c',
                        'hype-neon': '#ccff00',
                    },
                    fontFamily: {
                        display: ['Chakra Petch', 'sans-serif'],
                        tech: ['Koulen', 'sans-serif'],
                        graffiti: ['Permanent Marker', 'cursive'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    backgroundImage: {
                        'grid': "linear-gradient(to right, #1a1a1a 1px, transparent 1px), linear-gradient(to bottom, #1a1a1a 1px, transparent 1px)",
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #ffffff; }
        .bg-grid { background-size: 40px 40px; }
        
        input {
            background: transparent;
            border-bottom: 2px solid #333;
            border-radius: 0;
            color: #ccff00;
            font-family: 'Roboto Mono', monospace;
        }
        input:focus {
            outline: none;
            border-color: #ff003c;
        }
        
        /* Checkbox Custom */
        .checkbox-wrapper input:checked + div {
            background-color: #ccff00;
            border-color: #ccff00;
        }
        .checkbox-wrapper input:checked + div:after {
            content: '';
            display: block;
            width: 6px;
            height: 12px;
            border: solid #000;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-top: -2px;
            margin-left: 4px;
        }
    </style>
</head>
<body class="font-display antialiased bg-grid min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 bg-gradient-to-t from-hype-black via-transparent to-hype-black pointer-events-none"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 p-6 flex justify-between items-center mix-blend-difference">
        <a href="index.html" class="text-4xl font-bold italic tracking-tighter text-white hover:text-hype-neon transition-colors">VOLT X</a>
        <div class="text-right font-mono text-xs text-hype-red animate-pulse">
            <p>RAFFLE CLOSES IN 48:00:00</p>
        </div>
    </nav>

    <div class="relative z-10 w-full max-w-2xl px-6">
        <div class="bg-hype-black/90 border border-hype-gray p-8 md:p-12 backdrop-blur-md shadow-[10px_10px_0px_0px_rgba(255,0,60,1)]">
            
            <div class="mb-12 text-center">
                <h1 class="font-tech text-6xl md:text-7xl mb-2 text-white">ENTER THE DRAW</h1>
                <p class="font-mono text-hype-gray text-sm">ONE ENTRY PER PERSON. BOTS WILL BE DISQUALIFIED.</p>
            </div>

            <form id="raffle-form" class="space-y-8">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="group">
                        <label class="block font-mono text-xs text-hype-gray mb-2">FIRST_NAME</label>
                        <input type="text" required class="w-full py-2 text-xl uppercase">
                    </div>
                    <div class="group">
                        <label class="block font-mono text-xs text-hype-gray mb-2">LAST_NAME</label>
                        <input type="text" required class="w-full py-2 text-xl uppercase">
                    </div>
                </div>

                <div class="group">
                    <label class="block font-mono text-xs text-hype-gray mb-2">EMAIL_ADDRESS</label>
                    <input type="email" required class="w-full py-2 text-xl uppercase">
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="group">
                        <label class="block font-mono text-xs text-hype-gray mb-2">SIZE (US)</label>
                        <select class="w-full bg-transparent border-b-2 border-[#333] text-hype-neon font-mono text-xl py-2 uppercase focus:outline-none focus:border-hype-red">
                            <option class="bg-hype-black">US 7</option>
                            <option class="bg-hype-black">US 8</option>
                            <option class="bg-hype-black">US 9</option>
                            <option class="bg-hype-black" selected>US 10</option>
                            <option class="bg-hype-black">US 11</option>
                            <option class="bg-hype-black">US 12</option>
                        </select>
                    </div>
                    <div class="group">
                        <label class="block font-mono text-xs text-hype-gray mb-2">INSTAGRAM_HANDLE</label>
                        <input type="text" required class="w-full py-2 text-xl uppercase" placeholder="@">
                    </div>
                </div>

                <div class="pt-4">
                    <label class="checkbox-wrapper flex items-center cursor-pointer">
                        <input type="checkbox" required class="hidden">
                        <div class="w-6 h-6 border-2 border-hype-gray mr-4 transition-colors"></div>
                        <span class="font-mono text-xs text-hype-gray">I AGREE TO THE TERMS & CONDITIONS AND ANTI-BOT POLICY.</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-hype-neon text-hype-black font-tech text-3xl py-4 hover:bg-white hover:text-hype-red transition-all skew-x-[-5deg] mt-8 uppercase">
                    <span class="skew-x-[5deg] inline-block">SUBMIT ENTRY</span>
                </button>
            </form>

            <!-- Success Message (Hidden) -->
            <div id="success-msg" class="hidden text-center py-12">
                <h2 class="font-tech text-5xl text-hype-neon mb-4">ENTRY CONFIRMED</h2>
                <p class="font-mono text-white mb-8">GOOD LUCK. WINNERS WILL BE NOTIFIED VIA EMAIL.</p>
                <div class="font-mono text-xs text-hype-gray border border-hype-gray p-4 inline-block">
                    REF_ID: <span class="text-white">#8X99-VOLT</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Background Elements -->
    <div class="absolute top-20 right-20 font-graffiti text-hype-gray text-9xl opacity-10 -rotate-12 pointer-events-none select-none">HYPE</div>
    <div class="absolute bottom-20 left-20 font-graffiti text-hype-gray text-9xl opacity-10 rotate-6 pointer-events-none select-none">WANT</div>

    <script>
        const form = document.getElementById('raffle-form');
        const successMsg = document.getElementById('success-msg');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Fake Processing Animation
            const btn = form.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="skew-x-[5deg] inline-block animate-pulse">VALIDATING...</span>';
            btn.disabled = true;

            setTimeout(() => {
                gsap.to(form, { opacity: 0, duration: 0.5, onComplete: () => {
                    form.style.display = 'none';
                    successMsg.classList.remove('hidden');
                    gsap.from(successMsg, { opacity: 0, y: 20, duration: 0.5 });
                }});
            }, 2000);
        });

        // Intro Animation
        gsap.from(".bg-hype-black", { y: 100, opacity: 0, duration: 1, ease: "power3.out" });
    </script>
</body>
</html>
