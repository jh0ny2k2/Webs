<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMI | Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'umi-blue': '#0a192f',
                        'umi-gold': '#d4af37',
                        'umi-cream': '#f4f1ea',
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a192f; color: #f4f1ea; }
        .pattern-overlay {
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1h2v2H1V1zm4 0h2v2H5V1zm4 0h2v2H9V1zm4 0h2v2h-2V1zm4 0h2v2h-2V1zm-8 4h2v2H9V5zm4 0h2v2h-2V5zm-8 4h2v2H5V9zm4 0h2v2H9V9zm-8 4h2v2H1v-2zm4 0h2v2H5v-2z' fill='%23d4af37' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.3;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: #d4af37; position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        input, select { background-color: transparent; border-bottom: 1px solid #d4af37; transition: border-color 0.3s; }
        input:focus, select:focus { outline: none; border-color: #f4f1ea; }
        
        /* Mobile Menu */
        .mobile-menu-overlay { clip-path: inset(0 0 100% 0); transition: clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .mobile-menu-overlay.active { clip-path: inset(0 0 0 0); }
    </style>
</head>
<body class="antialiased selection:bg-umi-gold selection:text-umi-blue cursor-none">

    <div class="cursor-dot hidden md:block"></div>
    <div class="pattern-overlay fixed inset-0 pointer-events-none z-0"></div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 py-8 px-8 md:px-16 flex justify-between items-center mix-blend-difference">
        <a href="index.html" class="font-serif text-3xl italic tracking-wider text-umi-cream relative z-50">UMI <span class="text-xs not-italic font-sans tracking-[0.3em] block ml-1 text-umi-gold">OMAKASE</span></a>
        <div class="hidden md:flex gap-12 font-sans text-xs tracking-[0.2em] uppercase text-umi-cream items-center">
            <a href="menu.html" class="hover:text-umi-gold transition-colors relative group">MENU</a>
            <a href="about.html" class="hover:text-umi-gold transition-colors relative group">STORY</a>
            <a href="reservation.html" class="text-umi-gold relative group">RESERVATION</a>
            <a href="reservation.html" class="border border-umi-gold/50 px-6 py-3 hover:bg-umi-gold hover:text-umi-blue transition-all duration-500">BOOK TABLE</a>
        </div>
        <button id="menu-btn" class="md:hidden text-umi-cream text-2xl relative z-50"><i class="fas fa-bars"></i></button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu-overlay fixed inset-0 bg-umi-blue z-40 flex items-center justify-center">
        <div class="flex flex-col gap-10 text-center font-serif text-5xl text-umi-cream italic">
            <a href="index.html" class="hover:text-umi-gold transition-colors">Home</a>
            <a href="menu.html" class="hover:text-umi-gold transition-colors">Menu</a>
            <a href="about.html" class="hover:text-umi-gold transition-colors">Story</a>
            <a href="reservation.html" class="hover:text-umi-gold transition-colors">Reservation</a>
        </div>
    </div>

    <!-- Booking Section -->
    <section class="min-h-screen flex items-center justify-center pt-32 pb-20 px-6 relative z-10">
        <div class="container mx-auto max-w-4xl">
            <div class="text-center mb-16">
                <p class="font-sans text-umi-gold text-xs tracking-[0.4em] mb-4">SECURE YOUR SEAT</p>
                <h1 class="font-serif text-5xl md:text-7xl text-umi-cream italic mb-8">Reservation</h1>
                <p class="font-sans text-sm text-umi-cream/60 max-w-lg mx-auto leading-relaxed">
                    We release reservations on the 1st of each month for the following month. A deposit of ¥5,000 per person is required to confirm your booking.
                </p>
            </div>

            <form class="bg-umi-blue/50 backdrop-blur-sm border border-umi-gold/20 p-8 md:p-16">
                <div class="grid md:grid-cols-2 gap-12 mb-12">
                    <div class="group">
                        <label class="block font-sans text-xs tracking-widest text-umi-gold mb-4">DATE</label>
                        <input type="date" class="w-full py-2 text-umi-cream font-serif text-xl bg-transparent">
                    </div>
                    <div class="group">
                        <label class="block font-sans text-xs tracking-widest text-umi-gold mb-4">GUESTS</label>
                        <select class="w-full py-2 text-umi-cream font-serif text-xl bg-transparent">
                            <option class="text-umi-blue">1 Guest</option>
                            <option class="text-umi-blue" selected>2 Guests</option>
                            <option class="text-umi-blue">3 Guests</option>
                            <option class="text-umi-blue">4 Guests</option>
                        </select>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-12 mb-12">
                    <div class="group">
                        <label class="block font-sans text-xs tracking-widest text-umi-gold mb-4">TIME</label>
                        <div class="grid grid-cols-2 gap-4">
                            <button type="button" class="border border-umi-gold/30 py-3 text-umi-cream font-sans text-xs hover:bg-umi-gold hover:text-umi-blue transition-colors">18:00</button>
                            <button type="button" class="border border-umi-gold/30 py-3 text-umi-cream font-sans text-xs hover:bg-umi-gold hover:text-umi-blue transition-colors">20:30</button>
                        </div>
                    </div>
                    <div class="group">
                        <label class="block font-sans text-xs tracking-widest text-umi-gold mb-4">COURSE</label>
                        <select class="w-full py-2 text-umi-cream font-serif text-xl bg-transparent">
                            <option class="text-umi-blue">Seasonal Omakase (¥18,000)</option>
                            <option class="text-umi-blue">Premium Omakase (¥25,000)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-12">
                    <label class="block font-sans text-xs tracking-widest text-umi-gold mb-4">CONTACT DETAILS</label>
                    <div class="grid md:grid-cols-2 gap-8">
                        <input type="text" placeholder="Full Name" class="w-full py-2 text-umi-cream font-serif text-xl placeholder-umi-cream/20">
                        <input type="email" placeholder="Email Address" class="w-full py-2 text-umi-cream font-serif text-xl placeholder-umi-cream/20">
                        <input type="tel" placeholder="Phone Number" class="w-full py-2 text-umi-cream font-serif text-xl placeholder-umi-cream/20">
                        <input type="text" placeholder="Dietary Restrictions" class="w-full py-2 text-umi-cream font-serif text-xl placeholder-umi-cream/20">
                    </div>
                </div>

                <button type="submit" class="w-full bg-umi-gold text-umi-blue py-4 font-sans text-xs tracking-[0.3em] hover:bg-umi-cream transition-colors duration-500">CONFIRM RESERVATION</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 border-t border-umi-gold/10 relative">
        <div class="container mx-auto px-6 md:px-16 text-center">
            <h2 class="font-serif text-4xl text-umi-cream italic mb-8">Umi.</h2>
            <p class="font-serif text-umi-cream/40 text-sm">© 2024 UMI RESTAURANT. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script>
        // Custom Cursor
        const cursor = document.querySelector('.cursor-dot');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Mobile Menu
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        let isMenuOpen = false;
        menuBtn.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if(isMenuOpen) { mobileMenu.classList.add('active'); menuBtn.innerHTML = '<i class="fas fa-times"></i>'; } 
            else { mobileMenu.classList.remove('active'); menuBtn.innerHTML = '<i class="fas fa-bars"></i>'; }
        });

        // Time Selection
        const timeBtns = document.querySelectorAll('button[type="button"]');
        timeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                timeBtns.forEach(b => {
                    b.classList.remove('bg-umi-gold', 'text-umi-blue');
                    b.classList.add('text-umi-cream');
                });
                btn.classList.add('bg-umi-gold', 'text-umi-blue');
                btn.classList.remove('text-umi-cream');
            });
        });
    </script>
</body>
</html>
